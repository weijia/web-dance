name: "Auto Deploy with Version"
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
permissions:
  contents: read
concurrency:
  group: "deploy"
  cancel-in-progress: true
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ========== 获取版本信息 ==========
      - name: Get version info
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          # 获取 tag 的创建时间
          TAG_DATE=$(git log -1 --format=%ci $TAG 2>/dev/null || date -u +"%Y-%m-%d %H:%M:%S")
          echo "build_time=$TAG_DATE" >> $GITHUB_OUTPUT

          # 获取 commit SHA
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

          echo "📦 Version: $TAG"
          echo "🕐 Build Time: $TAG_DATE"
          echo "🔨 Commit: ${GITHUB_SHA::7}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # ========== 构建（注入版本信息） ==========
      - name: Build the project
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.tag }}
          VITE_APP_BUILD_TIME: ${{ steps.version.outputs.build_time }}
          VITE_APP_COMMIT_SHA: ${{ steps.version.outputs.sha }}

      # ========== 部署到 WebDAV ==========
      # action-upload-webdav 自动目录规则（见 docs/webdav-deploy-spec.md）：
      # - 有 git tag 时 → 使用 "release" 目录
      # - 无 git tag 时 → 使用 ISO 时间戳目录 (如 2026-06-06T02-30-00)
      # - copy-to-latest: true → 同时在 webdav-root 下创建 latest/ 目录
      - name: Upload to WebDAV
        uses: weijia/action-upload-webdav@v1.2.0
        with:
          webdav-url: ${{ secrets.WEBDAV_URL }}
          webdav-username: ${{ secrets.WEBDAV_USERNAME }}
          webdav-password: ${{ secrets.WEBDAV_PASSWORD }}
          webdav-root: online/${{ github.event.repository.name }}
          source-directory: ./dist
          copy-to-latest: 'true'
